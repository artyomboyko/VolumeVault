services:
  volumevault:
    image: volumevault:local
    build: .
    ports:
      - "8080:8000"
    volumes:
      - volumevault_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      APP_KEY: ${APP_KEY:?Set APP_KEY before starting VolumeVault}
    restart: unless-stopped

volumes:
  volumevault_data:
