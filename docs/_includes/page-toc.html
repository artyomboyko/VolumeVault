<script>
  document.addEventListener('DOMContentLoaded', () => {
    const article = document.querySelector('main > article[data-toc="true"]');
    const tocWrapper = document.getElementById('toc-wrapper');

    if (!article || !tocWrapper || !window.tocbot) {
      return;
    }

    const desktop = window.matchMedia('(min-width: 1200px)').matches;
    const tocSelector = desktop ? '#toc' : '#toc-popup-content';
    const toc = document.querySelector(tocSelector);

    if (!toc) {
      return;
    }

    if (desktop && !tocWrapper.querySelector('.vv-toc-repo-badges')) {
      toc.insertAdjacentHTML('beforebegin', `
        <div class="vv-toc-repo-badges">
          <a class="vv-repo-badges" href="https://github.com/Darkdragon14/VolumeVault" target="_blank" rel="noopener noreferrer" aria-label="VolumeVault GitHub stars and latest release">
            <img class="vv-repo-badges__light" src="https://shieldcn.dev/group/github/stars/Darkdragon14/VolumeVault+github/release/Darkdragon14/VolumeVault.svg?size=sm&variant=principal" alt="VolumeVault GitHub stars and latest release" height="20">
            <img class="vv-repo-badges__dark" src="https://shieldcn.dev/group/github/stars/Darkdragon14/VolumeVault+github/release/Darkdragon14/VolumeVault.svg?size=sm&variant=secondary" alt="VolumeVault GitHub stars and latest release" height="20">
          </a>
        </div>
      `);
    }

    window.tocbot.init({
      contentSelector: '.content',
      tocSelector,
      headingSelector: 'h2, h3, h4',
      ignoreSelector: '[data-toc-skip]',
      orderedList: false,
      scrollSmooth: false,
      collapseDepth: 4,
      headingsOffset: desktop ? 16 * 2 : 16 * 3
    });

    tocWrapper.classList.remove('invisible');
  });
</script>
